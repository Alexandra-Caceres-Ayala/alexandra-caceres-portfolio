<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Definición del degradado usando los colores de tu paleta -->
  <defs>
    <linearGradient id="gradienteTech" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8fa3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a0dc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo circular oscuro de tu portafolio -->
  <circle cx="256" cy="256" r="256" fill="#171020"/>
  
  <!-- Borde sutil brillante -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="rgba(255, 143, 163, 0.3)" stroke-width="8"/>

  <!-- Letras ACA centradas con tamaño ajustado -->
  <text x="50%" y="54%" font-family="system-ui, -apple-system, sans-serif" font-size="180" font-weight="bold" fill="url(#gradienteTech)" text-anchor="middle" dominant-baseline="middle" letter-spacing="-5">
    ACA
  </text>
</svg>
